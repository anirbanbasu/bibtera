name: Markdown Lint

permissions:
    contents: read
    pull-requests: write
on:
    push:
        branches:
            - master
            - develop
            - release/*
        paths:
            - "**/*.md"
            - ".github/workflows/md-lint.yml"
    pull_request:
        paths:
            - "**/*.md"
            - ".github/workflows/md-lint.yml"
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Set up Git repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - name: Lint
              uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
    changelog:
        name: CHANGELOG.md
        runs-on: ubuntu-latest
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Checkout source
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - name: Lint CHANGELOG.md
              run: |
                  # Install jbang
                  curl -Ls https://raw.githubusercontent.com/jbangdev/jbang/4bcb11945c968cdcb9b1f8a75f246dbc4d00633b/src/main/scripts/jbang | bash -s - app setup
                  export PATH=$PATH:$HOME/.jbang/bin

                  # run heylogs verification
                  jbang com.github.nbbrd.heylogs:heylogs-cli:0.9.2:bin check CHANGELOG.md > heylogs.txt || true

                  # improve output
                  # sed -i 's/all-h2-contain-a-version/all-h2-contain-a-version (ignored)/' heylogs.txt

                  cat heylogs.txt

                  # exit 1 in case of error
                  grep -q "No problem" heylogs.txt || exit 1
