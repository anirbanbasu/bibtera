name: DCO sign-off
permissions:
    contents: read
    pull-requests: write

on:
    pull_request:

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
              with:
                  egress-policy: audit

            - uses: KineticCafe/actions-dco@f7fe2fdfb5808e2528042be3919b67079100b96b # v3.0.0
