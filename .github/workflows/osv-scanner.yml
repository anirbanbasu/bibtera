# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# A sample workflow which sets up periodic OSV-Scanner scanning for vulnerabilities,
# in addition to a PR check which fails if new vulnerabilities are introduced.
#
# For more examples and options, including how to ignore specific vulnerabilities,
# see https://google.github.io/osv-scanner/github-action/

name: OSV-Scanner

on:
    pull_request:
        branches: [ "master" ]
        paths:
            - "**/Cargo.toml"
            - "**/Cargo.lock"
            - ".github/workflows/osv-scanner.yml"
    merge_group:
        branches: [ "master" ]
    schedule:
        - cron: "00 7 * * 0"
    push:
        branches: [ "master" ]
        paths:
            - "**/Cargo.toml"
            - "**/Cargo.lock"
            - ".github/workflows/osv-scanner.yml"

permissions:
    contents: read

jobs:
    scan-scheduled:
        if: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
        runs-on: ubuntu-latest
        permissions:
            # Required to upload SARIF file to security tab
            security-events: write
            # Required to read commit contents
            contents: read
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Run OSV-Scanner
              uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
              with:
                  scan-args: |-
                      -r
                      --format sarif
                      --output results.sarif
                      ./
              continue-on-error: true # This is necessary to report when vulnerabilities are found

            - name: Upload SARIF file
              uses: github/codeql-action/upload-sarif@77591e2c4a43bf190ac768983419eb058187e62f # v2.24.1
              with:
                  sarif_file: results.sarif
              if: success() || failure()

    scan-pr:
        if: ${{ github.event_name == 'pull_request' || github.event_name ==
            'merge_group' }}
        runs-on: ubuntu-latest
        permissions:
            # Required to upload SARIF file to security tab
            security-events: write
            # Required to read commit contents
            contents: read
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Run OSV-Scanner (compare mode for PRs)
              uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
              with:
                  scan-args: |-
                      -r
                      --format sarif
                      --output results.sarif
                      ./
              continue-on-error: true # This is necessary to report when vulnerabilities are found

            - name: Upload SARIF file
              uses: github/codeql-action/upload-sarif@77591e2c4a43bf190ac768983419eb058187e62f # v2.24.1
              with:
                  sarif_file: results.sarif
              if: success() || failure()
