name: Markdown Lint

permissions:
    contents: read
    pull-requests: write
on:
    push:
        branches:
            - master
            - develop
            - release/*
        paths:
            - "**/*.md"
            - ".github/workflows/md-lint.yml"
    pull_request:
        paths:
            - "**/*.md"
            - ".github/workflows/md-lint.yml"
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Set up Git repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Lint
              uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
    changelog:
        name: CHANGELOG.md
        runs-on: ubuntu-latest
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout source
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Lint CHANGELOG.md
              run: |
                  # Install jbang
                  curl -Ls https://raw.githubusercontent.com/jbangdev/jbang/4bcb11945c968cdcb9b1f8a75f246dbc4d00633b/src/main/scripts/jbang | bash -s - app setup
                  export PATH=$PATH:$HOME/.jbang/bin

                  # run heylogs verification
                  jbang com.github.nbbrd.heylogs:heylogs-cli:0.9.2:bin check CHANGELOG.md > heylogs.txt || true

                  # improve output
                  # sed -i 's/all-h2-contain-a-version/all-h2-contain-a-version (ignored)/' heylogs.txt

                  cat heylogs.txt

                  # exit 1 in case of error
                  grep -q "No problem" heylogs.txt || exit 1
